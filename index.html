<script src="https://cdn.payplug.com/js/payplug-themes.js"></script>

<form id="payment-form">
  <div id="payplug-card"></div>
  <button type="submit">Payer</button>
</form>

<script>
  const payplug = Payplug({
    publishableKey: "sk_test_3ZeT9qQSi1sDEVgthSthw0" // ✅ clé publique Payplug
  });

  const card = payplug.createCard();
  card.mount("#payplug-card");

  document
    .getElementById("payment-form")
    .addEventListener("submit", async e => {
      e.preventDefault();

      const result = await payplug.createToken(card);

      if (result.error) {
        console.error(result.error);
      } else {
        // 👉 envoyer result.token.id à ton backend
        console.log(result.token.id);
      }
    });
</script>
