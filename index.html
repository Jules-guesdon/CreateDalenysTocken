<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer un HFTOKEN</title>

  <!-- Hosted Fields Dalenys Sandbox -->
  <script src="https://js.sandbox.be2bill.com/hostedfields/v1/hosted-fields.min>
    .field {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      width: 250px;
      height: 40px;
    }
  </style>
</head>

<body>

<h3>Générer un HFTOKEN</h3>

<form id="cardForm">
  <div id="card-number" class="field"></div>
  <div id="card-expiry" class="field"></div>
  <div id="card-cvv" class="field"></div>

  <button type="submit">Générer le token</button>
</form>

<pre id="result"></pre>

<script>
  if (!window.HostedFields) {
    document.getElementById("result").textContent =
      "❌ HostedFields non chargé";
    throw new Error("HostedFields non chargé");
  }

  const hf = HostedFields.initialize({
    publicKey: "TA_CLE_PUBLIQUE_SANDBOX", // ⚠️ vraie clé sandbox ici
    fields: {
      cardNumber: { selector: "#card-number" },
      expiryDate: { selector: "#card-expiry" },
      cvv: { selector: "#card-cvv" }
    }
  });

  document.getElementById("cardForm").addEventListener("submit", async e => {
    e.preventDefault();
    try {
      const res = await hf.createToken();
      document.getElementById("result").textContent =
        "✅ HFTOKEN : " + res.token;
    } catch (err) {
      document.getElementById("result").textContent =
        "❌ Erreur : " + JSON.stringify(err, null, 2);
    }
  });
</script>

</body>
</html>
